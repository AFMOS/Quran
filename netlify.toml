[build]
  command = "npm run build"
  publish = "dist"

# CDN caching: long-lived JSON (content changes only when you redeploy); hashed Vite assets are immutable.
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/quran_chapters/*.json"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
