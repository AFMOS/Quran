<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<script src="early-theme.js"></script>
<script src="quran-debug.js"></script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>البحث في القرآن</title>
<style>
* { box-sizing: border-box; }
body { font-family: 'Traditional Arabic', 'Times New Roman', serif; margin: 0; padding: 20px; background: #f5f0e6; color: #5c4b37; }
h1 { text-align: center; color: #0DC895; }
.search-box { max-width: 500px; margin: 20px auto; }
.search-box input { width: 100%; padding: 12px 16px; font-size: 18px; border: 2px solid #0DC895; border-radius: 8px; }
.search-box input:focus { outline: none; border-color: #0d7377; }
.search-box input:disabled { opacity: 0.6; cursor: not-allowed; }
.nav { text-align: center; margin: 15px 0; }
.nav a { display: inline-block; margin: 0 8px; padding: 8px 16px; background: linear-gradient(135deg,#0d7377,#0a5c5f); color: #fff; text-decoration: none; border-radius: 8px; }
.nav a:hover { background: #0DC895; }
.results { max-width: 800px; margin: 20px auto; }
.result-item { padding: 12px 16px; margin: 8px 0; background: #f8f9fa; border-right: 4px solid #0DC895; border-radius: 4px; }
.result-item .ref { font-size: 14px; color: #666; margin-bottom: 4px; }
.result-item .verse { font-size: 22px; line-height: 1.8; }
.no-results { text-align: center; padding: 40px; color: #666; font-size: 18px; }
.count { text-align: center; color: #666; margin: 10px 0; }
</style>
</head>
<body>
<h1>البحث في القرآن</h1>
<div class="nav">
  <a href="index.html">فهرس السور</a>
</div>
<div class="search-box">
  <input type="text" id="q" placeholder="اكتب للبحث في الآيات…" autocomplete="off" disabled aria-busy="true" aria-describedby="load">
</div>
<div class="count" id="count"></div>
<div class="no-results" id="load">جاري تحميل بيانات البحث…</div>
<div class="results" id="results"></div>

<script>
(function () {
  var SURAH_NAMES_AR = ['الفاتحة','البقرة','آل عمران','النساء','المائدة','الأنعام','الأعراف','الأنفال','التوبة','يونس','هود','يوسف','الرعد','إبراهيم','الحجر','النحل','الإسراء','الكهف','مريم','طه','الأنبياء','الحج','المؤمنون','النور','الفرقان','الشعراء','النمل','القصص','العنكبوت','الروم','لقمان','السجدة','الأحزاب','سبأ','فاطر','يس','الصافات','ص','الزمر','غافر','فصلت','الشورى','الزخرف','الدخان','الجاثية','الأحقاف','محمد','الفتح','الحجرات','ق','الذاريات','الطور','النجم','القمر','الرحمن','الواقعة','الحديد','المجادلة','الحشر','الممتحنة','الصف','الجمعة','المنافقون','التغابن','الطلاق','التحريم','الملك','القلم','الحاقة','المعارج','نوح','الجن','المزمل','المدثر','القيامة','الإنسان','المرسلات','النبأ','النازعات','عبس','التكوير','الانفطار','المطففين','الانشقاق','البروج','الطارق','الأعلى','الغاشية','الفجر','البلد','الشمس','الليل','الضحى','الشرح','التين','العلق','القدر','البينة','الزلزلة','العاديات','القارعة','التكاثر','العصر','الهمزة','الفيل','قريش','الماعون','الكوثر','الكافرون','النصر','المسد','الإخلاص','الفلق','الناس'];
  var surahNames = {};
  for (var i = 0; i < SURAH_NAMES_AR.length; i++) surahNames[String(i + 1)] = SURAH_NAMES_AR[i];

  function stripTashkeel(s) {
    return s.replace(/[\u064B-\u0652\u0670\u0617-\u061A\u06D6-\u06ED]/g, '');
  }

  var data = null;
  var qEl = document.getElementById('q');
  var loadEl = document.getElementById('load');

  fetch('search_data.json')
    .then(function (r) {
      if (!r.ok) throw new Error('bad status');
      return r.json();
    })
    .then(function (d) {
      data = d;
      loadEl.style.display = 'none';
      qEl.disabled = false;
      qEl.removeAttribute('aria-busy');
      qEl.focus();
    })
    .catch(function () {
      loadEl.textContent = 'تعذر تحميل بيانات البحث. تحقق من الاتصال ثم أعد تحميل الصفحة.';
    });

  qEl.oninput = function () {
    if (!data) return;
    var q = stripTashkeel(this.value.trim());
    var res = document.getElementById('results');
    var cnt = document.getElementById('count');
    if (!q || q.length < 2) {
      res.innerHTML = '';
      cnt.textContent = '';
      return;
    }
    var matches = data.filter(function (v) {
      return stripTashkeel(v.t).indexOf(q) !== -1;
    });
    cnt.textContent = matches.length ? 'عدد النتائج: ' + matches.length : '';
    if (!matches.length) {
      res.innerHTML = '<div class="no-results">لا توجد نتائج</div>';
      return;
    }
    res.innerHTML = matches.slice(0, 100).map(function (v) {
      return (
        '<div class="result-item">' +
        '<div class="ref"><a href="ch_' + String(v.s).padStart(3, '0') + '.html">سورة ' +
        (surahNames[v.s] || v.s) + ' — آية ' + v.v + '</a></div>' +
        '<div class="verse">' + v.t + '</div></div>'
      );
    }).join('');
    if (matches.length > 100) {
      res.innerHTML += '<div class="no-results">عرض أول 100 نتيجة من ' + matches.length + '</div>';
    }
  };
})();
</script>
<script src="reader.js"></script>
<script>
  if (typeof quranDebug === 'function') quranDebug('search.page', { href: location.href, phase: 'afterScripts' });
</script>
</body>
</html>
