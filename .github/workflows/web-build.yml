# Verifies `npm run build` on every push / PR (static site + generated quran-debug).

name: Web build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: web-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
