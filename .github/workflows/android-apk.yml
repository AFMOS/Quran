# Build a debug APK in the cloud (no Android Studio on your PC).
# After the run finishes: Actions → latest run → Artifacts → app-debug-apk
#
# `npm run build` is required here: Capacitor copies `dist/` into the Android app before Gradle runs.

name: Build Android APK (debug)

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.properties', 'android/gradle/wrapper/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm ci

      - name: Build web (Vite → dist)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platform & build-tools (API 34)
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Gradle build (assembleDebug)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
